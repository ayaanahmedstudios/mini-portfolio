// --- GSAP "Lens Sweep" Animation (Zero Horizontal Clashing) ---
const nameEl = document.getElementById('hero-name');
const nameText = nameEl.innerText;
nameEl.innerHTML = '';

nameText.split('').forEach(char => {
    let span = document.createElement('span');
    span.innerText = char === ' ' ? '\u00A0' : char;
    // Set origin to bottom so vertical scaling doesn't shift the baseline
    span.style.display = 'inline-block';
    span.style.transformOrigin = 'bottom center';
    nameEl.appendChild(span);
});

// Subtle overall tracking breathe
gsap.to('#hero-name', {
    letterSpacing: "0.02em",
    duration: 3,
    ease: "sine.inOut",
    yoyo: true,
    repeat: -1
});

// Smooth, non-colliding refractive wave
gsap.to('#hero-name span', {
    fontVariationSettings: '"slnt" -10',
    scaleY: 1.15,
    filter: "blur(0.8px)",
    color: '#737373',
    duration: 1.4,
    stagger: {
        each: 0.1,
        yoyo: true,
        repeat: -1
    },
    ease: "sine.inOut"
});

// --- Fully Interactive Subtitle-Genre Rendering Engine ---
const container = document.getElementById('projects-container');

function getGenreLayout(p) {
    const genre = p.subtitle.toLowerCase();
    const cleanUrl = p.title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
    
    // Brand Identity / Series Logos
    if (genre.includes("brand") || genre.includes("identity") || genre.includes("rebrand") || genre.includes("logo")) {
        return `
            <div class="widget-brand" id="brand-widget-${p.id}">
                <div class="brand-hero"><img src="${p.img}" alt="${p.title}" id="brand-img-${p.id}"></div>
                <div class="brand-toolbar">
                    <span class="tool-label">Contrast Matrix</span>
                    <div class="brand-assets">
                        <div class="swatches">
                            <button class="swatch active" style="background:#171717" onclick="changeBrandBg(${p.id}, '#171717', '#ffffff')"></button>
                            <button class="swatch" style="background:#ececec" onclick="changeBrandBg(${p.id}, '#ececec', '#171717')"></button>
                            <button class="swatch" style="background:#555555" onclick="changeBrandBg(${p.id}, '#555555', '#ffffff')"></button>
                        </div>
                        <div class="type-specimen" id="type-${p.id}">Aa</div>
                    </div>
                </div>
            </div>`;
    } 
    // Books, Mags & Layouts
    else if (genre.includes("book") || genre.includes("typography") || genre.includes("magazine") || genre.includes("print")) {
        return `
            <div class="widget-book">
                <div class="book-viewport">
                    <img src="${p.img}" alt="${p.title}" id="book-img-${p.id}">
                </div>
                <div class="book-controls">
                    <div class="scrubber">
                        <button onclick="stepPage(${p.id}, -1)"><i class="ph ph-caret-left"></i></button>
                        <input type="range" min="1" max="16" value="1" class="page-slider" id="slider-${p.id}" oninput="updatePage(${p.id}, this.value)">
                        <button onclick="stepPage(${p.id}, 1)"><i class="ph ph-caret-right"></i></button>
                    </div>
                    <div class="page-indicator" id="page-indicator-${p.id}">Spread 1 / 16</div>
                </div>
            </div>`;
    } 
    // Web Design & Dashboards
    else if (genre.includes("web") || genre.includes("ui") || genre.includes("dashboard") || genre.includes("html")) {
        return `
            <div class="widget-web" id="web-widget-${p.id}">
                <div class="browser-bar">
                    <div class="dots"><i></i><i></i><i></i></div>
                    <div class="browser-url">ayaanahmed.org/${cleanUrl}</div>
                    <button class="theme-toggle" onclick="toggleWebTheme(${p.id})">
                        <i class="ph ph-sun-dim"></i>
                    </button>
                </div>
                <div class="browser-body">
                    <img src="${p.img}" alt="${p.title}">
                </div>
            </div>`;
    } 
    // Video & Narrative Animation
    else if (genre.includes("video") || genre.includes("animation") || genre.includes("motion")) {
        return `
            <div class="widget-video">
                <div class="video-wrapper">
                    <img src="${p.img}" alt="${p.title}" id="video-img-${p.id}">
                    <div class="play-overlay" id="play-overlay-${p.id}" onclick="togglePlayState(${p.id})"><i class="ph-fill ph-play-circle" id="play-icon-${p.id}"></i></div>
                </div>
                <div class="video-controls">
                    <button class="play-btn" onclick="togglePlayState(${p.id})"><i class="ph-fill ph-play" id="play-btn-icon-${p.id}"></i></button>
                    <div class="timeline" onclick="seekVideo(${p.id}, event)">
                        <div class="progress" id="video-progress-${p.id}" style="width: 0%"></div>
                    </div>
                    <span class="timecode" id="time-${p.id}">0:00 / 1:30</span>
                </div>
            </div>`;
    } 
    // Speculative & Analytical / Data Visualization
    else if (genre.includes("data") || genre.includes("speculative") || genre.includes("physical") || genre.includes("bag")) {
        return `
            <div class="widget-data">
                <div class="data-graph-container">
                    <svg class="data-svg" viewBox="0 0 400 160" id="matrix-svg-${p.id}">
                        <path d="M 10 130 Q 100 20, 200 80 T 390 50" fill="none" stroke="var(--border)" stroke-width="1.5" />
                        <line x1="10" y1="140" x2="390" y2="140" stroke="var(--border)" stroke-width="1" stroke-dasharray="4" />
                        <circle cx="100" cy="45" r="4" fill="var(--text)" />
                        <circle cx="235" cy="85" r="4" fill="var(--text)" />
                    </svg>
                </div>
                <div class="data-dashboard-controls">
                    <span class="tool-label">Vector Grid Parameters</span>
                    <div class="data-sliders">
                        <button onclick="randomizeGrid(${p.id})" class="control-btn"><i class="ph ph-shuffle"></i> Regenerate Matrix</button>
                    </div>
                </div>
            </div>`;
    }
    // Default / Poster Art & Photography
    else {
        return `
            <div class="widget-poster">
                <div class="poster-toolbar">
                    <span class="tool-label">Fine Canvas Controls</span>
                    <div class="tools">
                        <button onclick="toggleZoom(${p.id})" aria-label="Zoom Canvas"><i class="ph ph-magnifying-glass-plus"></i></button>
                        <button onclick="toggleInvert(${p.id})" aria-label="Invert Colors"><i class="ph ph-aperture"></i></button>
                        <button onclick="toggleRotate(${p.id})" aria-label="Rotate Image"><i class="ph ph-arrows-clockwise"></i></button>
                    </div>
                </div>
                <div class="poster-frame" id="poster-frame-${p.id}">
                    <img src="${p.img}" alt="${p.title}" id="poster-img-${p.id}">
                </div>
            </div>`;
    }
}

// Render out layout row nodes
projectsData.forEach(p => {
    const article = document.createElement('article');
    article.className = 'project';
    const widgetContent = getGenreLayout(p);
    
    article.innerHTML = `
        <div class="project-summary" onclick="toggleDropdown(${p.id})">
            <img src="${p.img}" alt="${p.title}">
            <div class="info">
                <h2>${p.title}</h2>
                <p>${p.subtitle}</p>
            </div>
            <i class="ph ph-caret-down dropdown-icon"></i>
        </div>
        <div class="project-dropdown" id="dropdown-${p.id}">
            <div class="dropdown-content">
                <div class="media-display">
                    ${widgetContent}
                </div>
            </div>
        </div>
    `;
    container.appendChild(article);
});

// Accordion transitions
function toggleDropdown(id) {
    const dropdown = document.getElementById(`dropdown-${id}`);
    const summary = dropdown.previousElementSibling;
    const isExpanded = dropdown.classList.contains('expanded');
    
    document.querySelectorAll('.project-dropdown').forEach(el => el.classList.remove('expanded'));
    document.querySelectorAll('.project-summary').forEach(el => el.classList.remove('active-row'));
    
    if (!isExpanded) {
        dropdown.classList.add('expanded');
        summary.classList.add('active-row');
    }
}

// --- Dynamic Interactive Widget Callbacks ---

// Brand Swatch Testing Action
function changeBrandBg(id, bgColor, textColor) {
    event.stopPropagation();
    const widget = document.getElementById(`brand-widget-${id}`);
    const specimen = document.getElementById(`type-${id}`);
    const swatches = widget.querySelectorAll('.swatch');
    
    swatches.forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    
    widget.style.backgroundColor = bgColor;
    widget.style.padding = '16px';
    widget.style.borderRadius = '6px';
    
    specimen.style.backgroundColor = bgColor;
    specimen.style.color = textColor;
    specimen.style.borderColor = textColor === '#ffffff' ? 'rgba(255, 255, 255, 0.2)' : 'var(--border)';
}

// Book Page Scrubber & Scroller Action
function updatePage(id, val) {
    if (event) event.stopPropagation();
    document.getElementById(`page-indicator-${id}`).innerText = `Spread ${val} / 16`;
    const img = document.getElementById(`book-img-${id}`);
    
    img.style.opacity = '0.9';
    setTimeout(() => { img.style.opacity = '1'; }, 100);
}

function stepPage(id, direction) {
    event.stopPropagation();
    const slider = document.getElementById(`slider-${id}`);
    let newVal = parseInt(slider.value) + direction;
    if (newVal >= 1 && newVal <= 16) {
        slider.value = newVal;
        updatePage(id, newVal);
    }
}

// Browser Mock Theme Switcher Action
function toggleWebTheme(id) {
    event.stopPropagation();
    const widget = document.getElementById(`web-widget-${id}`);
    const toggleIcon = widget.querySelector('.theme-toggle i');
    
    widget.classList.toggle('dark-mode');
    if (widget.classList.contains('dark-mode')) {
        toggleIcon.className = "ph ph-moon";
    } else {
        toggleIcon.className = "ph ph-sun-dim";
    }
}

// Video Simulation Control Loop
let videoIntervals = {};
function togglePlayState(id) {
    event.stopPropagation();
    const icon = document.getElementById(`play-icon-${id}`);
    const btnIcon = document.getElementById(`play-btn-icon-${id}`);
    const progress = document.getElementById(`video-progress-${id}`);
    const playOverlay = document.getElementById(`play-overlay-${id}`);
    const timecode = document.getElementById(`time-${id}`);
    
    const isPlaying = playOverlay.classList.toggle('playing');
    
    if (isPlaying) {
        icon.className = "ph-fill ph-pause-circle";
        btnIcon.className = "ph-fill ph-pause";
        playOverlay.style.opacity = "0";
        
        let percentage = parseFloat(progress.style.width) || 0;
        videoIntervals[id] = setInterval(() => {
            percentage += 1;
            if (percentage > 100) {
                percentage = 0;
                togglePlayState(id);
            }
            progress.style.width = `${percentage}%`;
            
            let currentSec = Math.floor((percentage / 100) * 90);
            let displayMin = Math.floor(currentSec / 60);
            let displaySec = currentSec % 60;
            timecode.innerText = `${displayMin}:${displaySec < 10 ? '0' + displaySec : displaySec} / 1:30`;
        }, 150);
    } else {
        icon.className = "ph-fill ph-play-circle";
        btnIcon.className = "ph-fill ph-play";
        playOverlay.style.opacity = "1";
        clearInterval(videoIntervals[id]);
    }
}

function seekVideo(id, e) {
    event.stopPropagation();
    const timeline = e.currentTarget;
    const progress = document.getElementById(`video-progress-${id}`);
    const rect = timeline.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const percentage = (clickX / rect.width) * 100;
    progress.style.width = `${percentage}%`;
}

// Parametric Generator Re-calc
function randomizeGrid(id) {
    event.stopPropagation();
    const svg = document.getElementById(`matrix-svg-${id}`);
    const y1 = Math.floor(Math.random() * 100) + 10;
    const y2 = Math.floor(Math.random() * 100) + 20;
    const y3 = Math.floor(Math.random() * 100) + 15;
    
    const path = svg.querySelector('path');
    path.setAttribute('d', `M 10 130 Q 100 ${y1}, 200 ${y2} T 390 ${y3}`);
    
    const circles = svg.querySelectorAll('circle');
    circles[0].setAttribute('cy', y1);
    circles[1].setAttribute('cy', y2);
}

// Photo Canvas Operations
function toggleZoom(id) {
    event.stopPropagation();
    const img = document.getElementById(`poster-img-${id}`);
    img.classList.toggle('zoomed');
}

function toggleInvert(id) {
    event.stopPropagation();
    const img = document.getElementById(`poster-img-${id}`);
    img.classList.toggle('inverted');
}

function toggleRotate(id) {
    event.stopPropagation();
    const img = document.getElementById(`poster-img-${id}`);
    img.classList.toggle('rotated');
}

// Minimal email copy interface
document.getElementById('email-btn').addEventListener('click', function() {
    navigator.clipboard.writeText('ayaanahmedstudios@gmail.com');
    const container = this.querySelector('.btn-content');
    
    container.innerHTML = `<span class="copied-text">Copied <i class="ph ph-check-circle"></i></span>`;
    
    setTimeout(() => {
        container.innerHTML = `<i class="ph ph-envelope-simple"></i>`;
    }, 2000);
});
